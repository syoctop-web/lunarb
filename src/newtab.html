<!DOCTYPE html>
<html lang="en" data-theme="lunar-dark">
<head>
  <meta charset="UTF-8" />
  <title>New Tab - Lunar</title>
  <link rel="stylesheet" href="styles/themes.css" />
  <link rel="stylesheet" href="styles/newtab.css" />
</head>
<body class="newtab-page density-comfortable" data-accent="#7c5cff">
  <div class="newtab-logo">Lunar</div>
  <div class="newtag-tagline">A faster way to browse the web</div>

  <div class="newtab-search">
    <input type="text" id="nt-search" placeholder="Search the web or enter address" autocomplete="off" />
    <button class="newtab-search-btn" id="nt-search-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="newtab-shortcuts" id="nt-shortcuts"></div>

  <script>
    // Detect current theme from parent window's settings
    (async () => {
      try {
        const settings = await window.__TAURI__.core.invoke('get_settings');
        document.documentElement.setAttribute('data-theme', settings.theme);
        document.body.setAttribute('data-accent', settings.accent_color);
        document.body.style.setProperty('--accent-override', settings.accent_color);
        document.body.className = `newtab-page density-${settings.density}`;

        const fontMap = {
          system: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
          inter: '"Inter", -apple-system, system-ui, sans-serif',
          roboto: '"Roboto", -apple-system, system-ui, sans-serif',
          jetbrains: '"JetBrains Mono", "SF Mono", Consolas, monospace',
        };
        document.body.style.fontFamily = fontMap[settings.font_family] || fontMap.system;
        document.body.style.fontSize = `${settings.font_size}px`;
      } catch (e) {
        console.warn('Could not load settings:', e);
      }
    })();

    const shortcuts = [
      { name: 'Google', url: 'https://google.com', color: '#4285f4', letter: 'G' },
      { name: 'YouTube', url: 'https://youtube.com', color: '#ff0000', letter: 'Y' },
      { name: 'GitHub', url: 'https://github.com', color: '#181717', letter: 'G' },
      { name: 'Reddit', url: 'https://reddit.com', color: '#ff4500', letter: 'R' },
      { name: 'Wikipedia', url: 'https://wikipedia.org', color: '#000000', letter: 'W' },
      { name: 'Twitter', url: 'https://twitter.com', color: '#1da1f2', letter: 'X' },
      { name: 'Amazon', url: 'https://amazon.com', color: '#ff9900', letter: 'A' },
      { name: 'Netflix', url: 'https://netflix.com', color: '#e50914', letter: 'N' },
    ];

    const container = document.getElementById('nt-shortcuts');
    shortcuts.forEach(s => {
      const el = document.createElement('a');
      el.className = 'newtab-shortcut';
      el.href = s.url;
      el.innerHTML = `
        <div class="shortcut-icon" style="background:${s.color}">${s.letter}</div>
        <div class="shortcut-name">${s.name}</div>
      `;
      el.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = s.url;
      });
      container.appendChild(el);
    });

    const searchInput = document.getElementById('nt-search');
    const searchBtn = document.getElementById('nt-search-btn');

    function doSearch() {
      const q = searchInput.value.trim();
      if (!q) return;
      let url = q;
      if (!q.match(/^https?:\/\//) && !(q.includes('.') && !q.includes(' '))) {
        url = `https://www.google.com/search?q=${encodeURIComponent(q)}`;
      } else if (!q.match(/^https?:\/\//)) {
        url = `https://${q}`;
      }
      window.location.href = url;
    }

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
    searchInput.focus();
  </script>
</body>
</html>
