name: Build Lunar for Windows

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install Tauri CLI
        run: npm install -D @tauri-apps/cli@latest

      - name: Install frontend deps
        run: npm install

      - name: Build Lunar (release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectName: Lunar
          tagName: v1.0.0
          releaseName: 'Lunar v1.0.0'
          releaseBody: 'Lunar Browser - Fast, beautiful, customizable browser built in Rust'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: Upload EXE artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Lunar-windows-exe
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/Lunar.exe
          if-no-files-found: warn

      - name: Create portable zip
        shell: powershell
        run: |
          if (Test-Path "src-tauri/target/release/Lunar.exe") {
            Compress-Archive -Path "src-tauri/target/release/Lunar.exe" -DestinationPath "Lunar-portable.zip"
          }

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: Lunar-portable
          path: Lunar-portable.zip
          if-no-files-found: warn
          
